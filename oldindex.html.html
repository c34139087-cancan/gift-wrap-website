<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Candida Cook – Cancan's Corner Gift Wrapping Service</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Lato', sans-serif;
      background: linear-gradient(145deg, #1A0E30 0%, #281545 50%, #3a1f5e 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #fff;
      border-radius: 24px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.45), 0 0 0 1px rgba(240,201,126,0.15);
      max-width: 440px;
      width: 100%;
      overflow: hidden;
    }

    /* ── HEADER ── */
    .header {
      background: linear-gradient(160deg, #40295b 0%, #5a3d7a 60%, #7a55a0 100%);
      padding: 44px 32px 36px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 70% 50% at 50% 0%, rgba(240,201,126,0.12) 0%, transparent 70%);
    }

    .logo-wrap {
      position: relative;
      z-index: 1;
      width: 130px;
      height: 130px;
      margin: 0 auto 20px;
      border-radius: 50%;
      border: 3px solid #f0c97e;
      box-shadow: 0 0 0 6px rgba(240,201,126,0.18), 0 8px 28px rgba(0,0,0,0.35);
      overflow: hidden;
      background: #fff;
    }
    .logo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .name {
      position: relative;
      z-index: 1;
      font-family: 'Playfair Display', serif;
      font-size: 1.9rem;
      font-weight: 700;
      color: #fff;
      line-height: 1.2;
      margin-bottom: 8px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .title {
      position: relative;
      z-index: 1;
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 1rem;
      color: #f0c97e;
      letter-spacing: 0.03em;
    }

    /* ── DIVIDER ── */
    .divider {
      height: 3px;
      background: linear-gradient(90deg, #40295b, #f0c97e, #c97ee0, #f0c97e, #40295b);
      background-size: 200% 100%;
      animation: shimmer 5s linear infinite;
    }
    @keyframes shimmer {
      0%   { background-position: 0% 0; }
      100% { background-position: 200% 0; }
    }

    /* ── BODY ── */
    .body {
      padding: 32px 28px 28px;
    }

    .contact-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 28px;
    }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 14px;
      background: #f5eefa;
      border: 1px solid rgba(90,61,122,0.12);
      border-radius: 12px;
      padding: 14px 18px;
      text-decoration: none;
      color: #281545;
      transition: background 0.22s, transform 0.18s, box-shadow 0.18s;
    }
    .contact-item:hover {
      background: #ece0f8;
      transform: translateX(4px);
      box-shadow: 0 4px 14px rgba(90,61,122,0.18);
    }

    .icon-circle {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, #5a3d7a, #7a55a0);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .icon-circle svg {
      width: 18px;
      height: 18px;
      fill: #f0c97e;
    }

    .contact-label {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #7a55a0;
      margin-bottom: 2px;
    }
    .contact-value {
      font-size: 0.95rem;
      font-weight: 600;
      color: #281545;
    }

    /* ── QR SECTION ── */
    .qr-section {
      border-top: 2px solid #f0e8ff;
      padding-top: 24px;
      text-align: center;
    }
    .qr-heading {
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem;
      font-weight: 700;
      color: #40295b;
      margin-bottom: 14px;
    }
    .qr-frame {
      display: inline-block;
      background: #fff;
      border: 2px solid #e0c8f8;
      border-radius: 16px;
      padding: 14px;
      box-shadow: 0 4px 18px rgba(90,61,122,0.14);
    }
    .qr-frame img {
      width: 180px;
      height: 180px;
      display: block;
      border-radius: 6px;
    }
    .qr-note {
      font-size: 0.78rem;
      color: #9170b0;
      margin-top: 10px;
      letter-spacing: 0.04em;
    }

    /* ── FOOTER ── */
    .footer {
      text-align: center;
      padding: 16px 28px 22px;
      font-size: 0.72rem;
      color: #b09ac8;
      letter-spacing: 0.05em;
    }
    .footer strong { color: #7a55a0; }

    @media (max-width: 480px) {
      .name { font-size: 1.6rem; }
      .logo-wrap { width: 110px; height: 110px; }
    }
  </style>
</head>
