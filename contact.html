<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Cancan's Corner Gift Wrapping</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- Calendly -->
    <link href="https://assets.calendly.com/assets/external/widget.css" rel="stylesheet">
    <script src="https://assets.calendly.com/assets/external/widget.js"></script>
    <style>
        /* ── Page header ── */
        .contact-page-header {
            text-align: center;
            padding: 3rem 2rem 1.5rem;
            position: relative;
            z-index: 10;
        }
        .contact-page-header h2 {
            font-family: var(--font-display);
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--pastel-orange);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.4);
            margin-bottom: 0.5rem;
        }
        
 .contact-page-header p {
    color: var(--pastel-orange);
    font-size: 1rem;
    font-style: italic;
    text-shadow: 0 0 8px rgba(245, 215, 154, 0.4);
}

        .gold-divider {
            width: 80px;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--pastel-orange), transparent);
            margin: 1rem auto 0;
            border-radius: 2px;
        }

        /* ── Layout ── */
        .contact-layout {
            max-width: 1000px;
            margin: 0 auto;
            padding: 2rem 2rem 4rem;
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 2rem;
            align-items: start;
            position: relative;
            z-index: 10;
        }

        /* ── Form card ── */
        .form-card {
            background: rgba(32, 17, 60, 0.8);
            border-radius: var(--radius-xl);
            padding: 2.5rem;
            backdrop-filter: blur(10px);
            border: 2px solid var(--gray-lavender);
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }
        .form-card h3 {
            font-family: var(--font-display);
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--pastel-orange);
            margin-bottom: 0.3rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .form-card .form-subtitle {
            color: var(--gray-lavender);
            font-size: 0.88rem;
            margin-bottom: 1.5rem;
        }

        /* ── Purpose toggle ── */
        .purpose-toggle {
            display: flex;
            gap: 0;
            margin-bottom: 2rem;
            border-radius: var(--radius-md);
            overflow: hidden;
            border: 2px solid var(--gray-lavender);
        }
        .purpose-toggle button {
            flex: 1;
            padding: 0.75rem 1rem;
            background: transparent;
            border: none;
            color: var(--gray-lavender);
            font-family: var(--font-body);
            font-size: 0.82rem;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.25s ease;
        }
        .purpose-toggle button.active {
            background: linear-gradient(135deg, var(--gray-orange) 0%, var(--pastel-orange) 100%);
            color: #20113c;

        }
        .purpose-toggle button:not(.active):hover {
            background: rgba(245, 215, 154, 0.1);
            color: #20113c;

        }

        /* ── Form fields ── */
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        .form-group { margin-bottom: 1.2rem; }
        .form-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--gray-lavender);
            margin-bottom: 0.4rem;
        }
        .form-group label .req { color: var(--pastel-orange); }
        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 0.85rem 1.2rem;
            background: rgba(104, 82, 129, 0.3);
            border: 2px solid var(--gray-lavender);
            border-radius: var(--radius-md);
            color: #20113c;

            font-family: var(--font-body);
            font-size: 0.95rem;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }
        .form-group select option { background: var(--purple-deep); color: #20113c;
 }
        .form-group input::placeholder,
        .form-group textarea::placeholder { color: var(--gray-lavender); }
        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--pastel-orange);
            background: rgba(104, 82, 129, 0.5);
            box-shadow: 0 0 20px rgba(245, 215, 154, 0.2);
        }
        .form-group textarea { resize: vertical; min-height: 120px; }

        /* ── Quote-only fields (hidden by default) ── */
        .quote-fields {
            display: none;
            animation: fadeIn 0.3s ease;
        }
        .quote-fields.visible { display: block; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── Section divider inside form ── */
        .form-section-label {
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--pastel-orange);
            border-bottom: 1px solid rgba(245, 215, 154, 0.2);
            padding-bottom: 0.4rem;
            margin-bottom: 1.2rem;
            margin-top: 0.5rem;
        }

        /* ── Submit button ── */
        .send-btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--gray-orange) 0%, var(--pastel-orange) 100%);
            color: #20113c;

            font-family: var(--font-body);
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            border: none;
            border-radius: var(--radius-lg);
            cursor: pointer;
            margin-top: 0.5rem;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(245, 215, 154, 0.3);
        }
        .send-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(245, 215, 154, 0.5);
        }

        /* ── Calendly card (below main layout) ── */
        .booking-section {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 2rem 4rem;
            position: relative;
            z-index: 10;
        }
        .booking-card {
            background: rgba(32, 17, 60, 0.8);
            border-radius: var(--radius-xl);
            padding: 2.5rem;
            backdrop-filter: blur(10px);
            border: 2px solid var(--gray-lavender);
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            text-align: center;
        }
        .booking-card h3 {
            font-family: var(--font-display);
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--pastel-orange);
            margin-bottom: 0.5rem;
        }
        .booking-card .form-subtitle {
            color: var(--gray-lavender);
            font-size: 0.88rem;
            margin-bottom: 1.2rem;
        }
         .booking-card .avail-note {
            color: var(--pastel-orange);
            font-size: 0.95rem;
            margin-bottom: 2rem;
            /* Added glow effect below */
            text-shadow: 0 0 8px rgba(245, 215, 154, 0.4), 
                         0 0 15px rgba(245, 215, 154, 0.2);
        }

        .booking-card .cal-btn {
            display: inline-block;
            max-width: 360px;
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--gray-orange) 0%, var(--pastel-orange) 100%);
            color: #20113c;

            font-family: var(--font-body);
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            border: none;
            border-radius: var(--radius-lg);
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(245, 215, 154, 0.3);
        }
        .booking-card .cal-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(245, 215, 154, 0.5);
        }
        .booking-card .confirm-note {
            color: var(--gray-lavender);
            font-size: 0.78rem;
            margin-top: 1rem;
        }

        /* ── Sidebar ── */
        .contact-sidebar { display: flex; flex-direction: column; gap: 1.4rem; }
        .side-card {
            background: rgba(64, 41, 91, 0.6);
            backdrop-filter: blur(10px);
            border: 2px solid var(--gray-lavender);
            border-radius: var(--radius-lg);
            padding: 1.6rem;
            transition: all 0.3s ease;
        }
        .side-card:hover {
            border-color: var(--pastel-orange);
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }
        .side-card-title {
            font-size: 0.68rem;
            font-weight: 700;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--pastel-orange);
            margin-bottom: 1.2rem;
        }
        .profile-block { text-align: center; }
        .profile-block img {
            width: 72px; height: 72px;
            border-radius: 12px;
            object-fit: cover;
            border: 3px solid var(--pastel-orange);
            margin-bottom: 0.7rem;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }
        .profile-block h3 {
            font-family: var(--font-display);
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--pastel-orange);
        }
        .profile-block p {
            font-size: 0.78rem;
            color: var(--gray-lavender);
            font-style: italic;
            margin-top: 0.2rem;
        }
        .info-row {
            display: flex;
            gap: 0.8rem;
            align-items: center;
            margin-bottom: 1rem;
        }
        .info-icon {
            width: 36px; height: 36px; flex-shrink: 0;
            background: rgba(245, 215, 154, 0.1);
            border: 1px solid rgba(245, 215, 154, 0.25);
            border-radius: var(--radius-sm);
            display: flex; align-items: center; justify-content: center;
        }
        .info-label {
            font-size: 0.65rem;
            color: var(--gray-lavender);
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }
        .info-value { font-size: 0.9rem; color: #20113c;
 margin-top: 0.1rem; }
        .info-value a { color: #20113c;
 text-decoration: none; transition: color 0.2s; }
        .info-value a:hover { color: var(--pastel-orange); }
        .contact-divider {
            height: 1px;
            background: rgba(245, 215, 154, 0.15);
            margin: 1rem 0;
        }
        .schedule-btn {
            display: block;
            text-align: center;
            margin-top: 1rem;
            padding: 0.75rem;
            background: rgba(245, 215, 154, 0.1);
            border: 2px solid var(--gray-lavender);
            border-radius: var(--radius-md);
            color: var(--pastel-orange);
            font-size: 0.82rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-decoration: none;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }
        .schedule-btn:hover {
            background: rgba(245, 215, 154, 0.2);
            border-color: var(--pastel-orange);
            transform: translateY(-2px);
        }
        .qr-block {
            display: flex; flex-direction: column;
            align-items: center; gap: 0.7rem;
        }
        .qr-block p { font-size: 0.8rem; color: var(--gray-lavender); text-align: center; }
        .qr-img-wrap {
            background: #fff;
            border-radius: var(--radius-sm);
            padding: 8px;
            display: inline-block;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }
        .qr-img-wrap img { width: 130px; height: 130px; display: block; }

        /* ── Confetti animation ── */
        @keyframes float {
            0%   { transform: translateY(0px) rotate(0deg);   opacity: 0.7; }
            50%  { transform: translateY(-30px) rotate(180deg); opacity: 1; }
            100% { transform: translateY(0px) rotate(360deg); opacity: 0.7; }
        }
        .confetti-dot {
            position: absolute;
            border-radius: 50%;
            animation: float linear infinite;
            pointer-events: none;
        }

        /* ── Responsive ── */
@media (max-width: 720px) {
    .form-row { grid-template-columns: 1fr; }
}

/* ── Sidebar Contact Info ── */
.contact-info-item label {
    color: var(--pastel-yellow) !important;
    font-weight: 700;
}

.contact-info-item a,
.contact-info-item span {
    color: var(--pastel-orange) !important;
    text-shadow: 0 0 8px rgba(245, 215, 154, 0.3);
}

.qr-section p {
    color: var(--pastel-orange) !important;
    text-shadow: 0 0 8px rgba(245, 215, 154, 0.3);
}

/* ── Form Typing Color ── */
.form-group input,
.form-group textarea,
.form-group select {
    color: var(--pastel-orange) !important;
}
/* ── Sidebar Labels (CALL OR TEXT, EMAIL, etc.) ── */
.contact-info-item label {
    color: var(--pastel-yellow) !important;
    font-weight: 700;
}

/* ── Sidebar Details (Phone, Email, Location) ── */
.contact-info-item a, 
.contact-info-item span {
    color: var(--pastel-orange) !important;
    text-shadow: 0 0 8px rgba(245, 215, 154, 0.4);
}

/* ── QR Code Subtitle ── */
.qr-section p {
    color: var(--pastel-orange) !important;
}

</style>

    <script>
        // Purpose toggle logic
        const toggleBtns = document.querySelectorAll('.purpose-toggle button');
        const quoteFields = document.querySelector('.quote-fields');

        toggleBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                toggleBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                
                if (btn.dataset.purpose === 'quote') {
                    quoteFields.classList.add('visible');
                } else {
                    quoteFields.classList.remove('visible');
                }
            });
        });
    </script>
</body>
</html>
