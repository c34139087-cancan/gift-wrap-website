<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Cancan's Corner Gift Wrapping</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <!-- FIXED FONT AWESOME LINK -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com">
    
    <!-- Calendly -->
    <link href="https://assets.calendly.com/assets/external/widget.css" rel="stylesheet">
    <script src="https://assets.calendly.com/assets/external/widget.js"></script>
    <style>
        .contact-page-header { text-align: center; padding: 3rem 2rem 1.5rem; position: relative; z-index: 10; }
        .contact-page-header h2 { font-family: var(--font-display); font-size: 2.5rem; font-weight: 900; color: var(--pastel-orange); text-shadow: 2px 2px 4px rgba(0,0,0,0.4); margin-bottom: 0.5rem; }
        .contact-page-header p { color: var(--pastel-yellow); font-size: 1rem; font-style: italic; }
        .gold-divider { width: 80px; height: 3px; background: linear-gradient(90deg, transparent, var(--pastel-orange), transparent); margin: 1rem auto 0; border-radius: 2px; }
        .contact-layout { max-width: 1000px; margin: 0 auto; padding: 2rem 2rem 4rem; display: grid; grid-template-columns: 1fr 300px; gap: 2rem; align-items: start; position: relative; z-index: 10; }
        .form-card { background: rgba(32, 17, 60, 0.8); border-radius: var(--radius-xl); padding: 2.5rem; backdrop-filter: blur(10px); border: 2px solid var(--gray-lavender); box-shadow: 0 20px 60px rgba(0,0,0,0.4); }
        .form-card h3 { font-family: var(--font-display); font-size: 1.6rem; font-weight: 700; color: var(--pastel-orange); margin-bottom: 0.3rem; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        .form-card .form-subtitle { color: var(--gray-lavender); font-size: 0.88rem; margin-bottom: 2rem; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .form-group { margin-bottom: 1.2rem; }
        .form-group label { display: block; font-size: 0.75rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--gray-lavender); margin-bottom: 0.4rem; }
        .form-group label .req { color: var(--pastel-orange); }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 0.85rem 1.2rem; background: rgba(104, 82, 129, 0.3); border: 2px solid var(--gray-lavender); border-radius: var(--radius-md); color: var(--pastel-yellow); font-family: var(--font-body); font-size: 0.95rem; transition: all 0.3s ease; }
        .form-group select option { background: #20113c; color: var(--pastel-yellow); }
        .send-btn { width: 100%; padding: 1rem; background: linear-gradient(135deg, var(--gray-orange) 0%, var(--pastel-orange) 100%); color: var(--dark-purple); font-family: var(--font-body); font-size: 1rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; border: none; border-radius: var(--radius-lg); cursor: pointer; margin-top: 0.5rem; transition: all 0.3s ease; box-shadow: 0 8px 20px rgba(245, 215, 154, 0.3); }
        .send-btn:hover { transform: translateY(-3px); box-shadow: 0 12px 30px rgba(245, 215, 154, 0.5); }
        .contact-sidebar { display: flex; flex-direction: column; gap: 1.4rem; }
        .side-card { background: rgba(64, 41, 91, 0.6); backdrop-filter: blur(10px); border: 2px solid var(--gray-lavender); border-radius: var(--radius-lg); padding: 1.6rem; transition: all 0.3s ease; }
        .side-card-title { font-size: 0.68rem; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--pastel-orange); margin-bottom: 1.2rem; }
        .info-row { display: flex; gap: 0.8rem; align-items: center; margin-bottom: 1rem; }
        .info-icon { width: 36px; height: 36px; flex-shrink: 0; background: rgba(245, 215, 154, 0.1); border: 1px solid rgba(245, 215, 154, 0.25); border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; color: var(--pastel-orange); font-size: 1rem; }
        .info-label { font-size: 0.65rem; color: var(--gray-lavender); text-transform: uppercase; letter-spacing: 0.08em; }
        .info-value { font-size: 0.9rem; color: var(--pastel-yellow); margin-top: 0.1rem; }
        .info-value a { color: var(--pastel-yellow); text-decoration: none; }
        @media (max-width: 768px) { .contact-layout { grid-template-columns: 1fr; } .form-row { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="contact-page-header">
        <h2>Get in Touch</h2>
        <p>Let's make your next gift unforgettable.</p>
        <div class="gold-divider"></div>
    </div>

    <div class="contact-layout">
        <div class="form-card">
            <h3>Send a Request</h3>
            <p class="form-subtitle">Whether you need a quick answer or a custom quote, just let me know!</p>
            <form action="#">
                <div class="form-row">
                    <div class="form-group">
                        <label>Full Name <span class="req">*</span></label>
                        <input type="text" placeholder="Your Name" required>
                    </div>
                    <div class="form-group">
                        <label>Email Address <span class="req">*</span></label>
                        <input type="email" placeholder="email@example.com" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>How can I help you? <span class="req">*</span></label>
                    <select name="inquiry_type" required>
                        <option value="message">Send a General Message</option>
                        <option value="quote">Request a Gift Wrapping Quote</option>
                        <option value="booking">Book a Personal Session</option>
                        <option value="event">Corporate or Event Inquiry</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Details <span class="req">*</span></label>
                    <textarea placeholder="Tell me about your gifts or ask your question here..." required></textarea>
                </div>

                <button type="submit" class="send-btn">Send Message</button>
            </form>
        </div>

        <aside class="contact-sidebar">
            <div class="side-card">
                <div class="side-card-title">Direct Contact</div>
                <div class="info-row">
                    <div class="info-icon"><i class="fa-solid fa-phone"></i></div>
                    <div>
                        <div class="info-label">Phone</div>
                        <div class="info-value"><a href="tel:1234567890">(123) 456-7890</a></div>
                    </div>
                </div>
                <div class="info-row">
                    <div class="info-icon"><i class="fa-solid fa-envelope"></i></div>
                    <div>
                        <div class="info-label">Email</div>
                        <div class="info-value"><a href="mailto:hello@cancanscorner.com">hello@cancanscorner.com</a></div>
                    </div>
                </div>
                <div class="info-row">
                    <div class="info-icon"><i class="fa-solid fa-location-dot"></i></div>
                    <div>
                        <div class="info-label">Location</div>
                        <div class="info-value">Your City, State</div>
                    </div>
                </div>
            </div>
        </aside>
    </div>
</body>
</html>
