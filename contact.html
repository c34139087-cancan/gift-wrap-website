<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Cancan's Corner Gift Wrapping</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <!-- Font Awesome (Required for the icons to work) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com">
    <!-- Calendly -->
    <link href="https://assets.calendly.com" rel="stylesheet">
    <script src="https://assets.calendly.com"></script>
    <style>
        .contact-page-header {
            text-align: center;
            padding: 3rem 2rem 1.5rem;
            position: relative;
            z-index: 10;
        }
        .contact-page-header h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            font-weight: 900;
            color: #ECDB9F;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.4);
            margin-bottom: 0.5rem;
        }
        .contact-page-header p {
            color: rgba(255,255,255,0.7);
            font-size: 1rem;
            font-style: italic;
        }
        .gold-divider {
            width: 80px;
            height: 3px;
            background: linear-gradient(90deg, transparent, #ECDB9F, transparent);
            margin: 1rem auto 0;
            border-radius: 2px;
        }
        .contact-layout {
            max-width: 1000px;
            margin: 0 auto;
            padding: 2rem 2rem 4rem;
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 2rem;
            align-items: start;
            position: relative;
            z-index: 10;
        }
        .form-card {
            background: rgba(32, 17, 60, 0.8);
            border-radius: 20px;
            padding: 2.5rem;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(236, 219, 159, 0.2);
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }
        .form-card h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            color: #ECDB9F;
            margin-bottom: 1.5rem;
        }
        .form-group { margin-bottom: 1.2rem; }
        .form-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            color: rgba(255,255,255,0.6);
            margin-bottom: 0.4rem;
            text-transform: uppercase;
        }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 0.85rem;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(236, 219, 159, 0.3);
            border-radius: 8px;
            color: #fff;
        }
        .send-btn {
            width: 100%;
            padding: 1rem;
            background: #ECDB9F;
            color: #1A0E30;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
        }
        .contact-sidebar { display: flex; flex-direction: column; gap: 1.4rem; }
        .side-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(236, 219, 159, 0.2);
            border-radius: 16px;
            padding: 1.6rem;
        }
        .side-card-title {
            font-size: 0.7rem;
            font-weight: 700;
            color: #ECDB9F;
            margin-bottom: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        .info-row {
            display: flex;
            gap: 1rem;
            align-items: center;
            margin-bottom: 1.2rem;
        }
        .info-icon {
            width: 40px; height: 40px;
            background: rgba(236, 219, 159, 0.1);
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            color: #ECDB9F;
            font-size: 1.1rem;
        }
        .info-label { font-size: 0.65rem; color: rgba(255,255,255,0.5); text-transform: uppercase; }
        .info-value { font-size: 0.95rem; color: #fff; }
        .info-value a { color: #fff; text-decoration: none; }
        
        @media (max-width: 768px) {
            .contact-layout { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="contact-page-header">
        <h2>Get in Touch</h2>
        <p>Let's make your next gift unforgettable.</p>
        <div class="gold-divider"></div>
    </div>

    <div class="contact-layout">
        <!-- Contact Form -->
        <div class="form-card">
            <h3>Send a Message</h3>
            <form action="#">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" placeholder="Your Name">
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" placeholder="email@example.com">
                </div>
                <div class="form-group">
                    <label>Message</label>
                    <textarea placeholder="How can I help you?"></textarea>
                </div>
                <button type="submit" class="send-btn">Send Message</button>
            </form>
        </div>

        <!-- Sidebar Info -->
        <aside class="contact-sidebar">
            <div class="side-card">
                <div class="side-card-title">Contact Details</div>
                
                <div class="info-row">
                    <div class="info-icon"><i class="fa-solid fa-phone"></i></div>
                    <div>
                        <div class="info-label">Phone</div>
                        <div class="info-value"><a href="tel:1234567890">(123) 456-7890</a></div>
                    </div>
                </div>

                <div class="info-row">
                    <div class="info-icon"><i class="fa-solid fa-envelope"></i></div>
                    <div>
                        <div class="info-label">Email</div>
                        <div class="info-value"><a href="mailto:hello@cancanscorner.com">hello@cancanscorner.com</a></div>
                    </div>
                </div>

                <div class="info-row">
                    <div class="info-icon"><i class="fa-solid fa-location-dot"></i></div>
                    <div>
                        <div class="info-label">Location</div>
                        <div class="info-value">Your City, State</div>
                    </div>
                </div>
            </div>

            <div class="side-card">
                <div class="side-card-title">Follow the Art</div>
                <div class="info-row">
                    <div class="info-icon"><i class="fa-brands fa-instagram"></i></div>
                    <div>
                        <div class="info-label">Instagram</div>
                        <div class="info-value"><a href="#">@cancanscorner</a></div>
                    </div>
                </div>
            </div>
        </aside>
    </div>

</body>
</html>
