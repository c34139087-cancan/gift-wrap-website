<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client List | Cancan's Corner</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #20113c 0%, #40295b 50%, #685281 100%);
            color: #f5d79a;
            min-height: 100vh;
            padding: 2rem;
        }
        h1 {
            font-family: 'Playfair Display', serif;
            text-align: center;
            font-size: 2rem;
            color: #f5d79a;
            margin-bottom: 0.5rem;
        }
        .subtitle {
            text-align: center;
            color: #866e9f;
            font-size: 0.9rem;
            margin-bottom: 2rem;
            font-style: italic;
        }
        .client-card {
            background: rgba(32, 17, 60, 0.8);
            border: 2px solid #866e9f;
            border-radius: 16px;
            padding: 1.5rem 2rem;
            max-width: 600px;
            margin: 1rem auto;
            backdrop-filter: blur(10px);
        }
        .client-card h3 {
            color: #f5d79a;
            font-family: 'Playfair Display', serif;
            margin-bottom: 0.5rem;
        }
        .client-card p {
            color: #c39559;
            font-size: 0.9rem;
            margin: 0.2rem 0;
        }
        .status {
            text-align: center;
            color: #866e9f;
            font-style: italic;
            margin-top: 1rem;
        }
        .badge {
            display: inline-block;
            background: rgba(195, 149, 89, 0.2);
            border: 1px solid #c39559;
            border-radius: 20px;
            padding: 0.2rem 0.8rem;
            font-size: 0.75rem;
            color: #c39559;
            margin-top: 0.4rem;
        }
    </style>
</head>
<body>

    <h1>🎀 Cancan's Corner — Client List</h1>
    <p class="subtitle">Connected to Supabase · For assignment use only</p>

    <div id="client-list">
        <p class="status">Loading clients...</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const { createClient } = supabase;

        const SUPABASE_URL = 'https://umfheobuqegcluwedxwm.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_U4HMGQUZS4TPsi25qKXNmw_2BC1zrYd';

        const client = createClient(SUPABASE_URL, SUPABASE_KEY);

        async function loadClients() {
            const container = document.getElementById('client-list');

            const { data, error } = await client
                .from('clients')
                .select('*')
                .order('id', { ascending: true });

            if (error) {
                container.innerHTML = `<p class="status">Error loading clients: ${error.message}</p>`;
                return;
            }

            if (!data || data.length === 0) {
                container.innerHTML = `<p class="status">No clients found.</p>`;
                return;
            }

            container.innerHTML = data.map(c => `
                <div class="client-card">
                    <h3>${c.name}</h3>
                    <p>📧 ${c.email}</p>
                    <p>📞 ${c.phone}</p>
                    ${c.notes ? `<span class="badge">📝 ${c.notes}</span>` : ''}
                </div>
            `).join('');
        }

        loadClients();
    </script>

</body>
</html>
